<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RnBlue Beats - Dark R&B Type Beats. Room to breathe.">
    <meta property="og:title" content="RnBlue Beats">
    <meta property="og:description" content="RnBlue Beats - Dark R&B Type Beats. Room to breathe.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <title>RnBlue Beats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Urbanist:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            background: linear-gradient(180deg, #0D0D0D 0%, #1A1A40 100%);
            background-attachment: fixed;
            color: #F5F5F5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Particle canvas */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Sections */
        section {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* HERO */
        .hero {
            min-height: 100vh;
            padding-top: 0;
            padding-bottom: 0;
        }

        .logo {
            font-family: 'Urbanist', sans-serif;
            font-weight: 800;
            font-size: clamp(3rem, 8vw, 5rem);
            letter-spacing: 1px;
            margin-bottom: 12px;
            opacity: 0;
            animation: heroFadeIn 0.8s ease forwards;
        }

        .logo .dot {
            color: #6C5CE7;
        }

        @keyframes heroFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero .subtitle {
            font-size: 1rem;
            font-weight: 400;
            color: #F5F5F5;
            margin-bottom: 6px;
            opacity: 0;
            animation: heroFadeIn 0.8s ease 0.2s forwards;
        }

        .hero .tagline {
            font-style: italic;
            font-size: 0.95rem;
            color: #9381FF;
            opacity: 0;
            animation: heroFadeIn 0.8s ease 0.4s forwards;
        }

        .scroll-arrow {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            animation: bounce 2s ease-in-out infinite;
            opacity: 0.5;
        }

        .scroll-arrow span {
            display: block;
            width: 20px;
            height: 20px;
            border-right: 2px solid #9381FF;
            border-bottom: 2px solid #9381FF;
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(12px); }
        }

        /* Section titles */
        h2 {
            font-family: 'Urbanist', sans-serif;
            font-weight: 800;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            margin-bottom: 8px;
            text-align: center;
        }

        .section-sub {
            font-size: 0.9rem;
            color: #9381FF;
            margin-bottom: 32px;
            text-align: center;
        }

        /* Links / buttons */
        .link-btn {
            display: block;
            width: 100%;
            padding: 20px 32px;
            border-radius: 16px;
            border: 1px solid rgba(108, 92, 231, 0.4);
            background: rgba(108, 92, 231, 0.1);
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            text-decoration: none;
            text-align: center;
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            will-change: transform;
        }

        .link-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #9381FF;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.2);
        }

        .link-btn-compact {
            padding: 16px 24px;
            font-size: 1rem;
        }

        /* Social row */
        .social-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .social-row .link-btn {
            flex: 1;
        }

        /* Glow button */
        .link-btn-glow {
            padding: 24px 40px;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: 500;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(108, 92, 231, 0.3); }
            50% { box-shadow: 0 0 40px rgba(108, 92, 231, 0.5); }
        }

        /* Beats section */
        .beats {
            min-height: 60vh;
        }

        /* Social section */
        .social {
            min-height: 50vh;
        }

        /* Lead magnet */
        .lead-magnet {
            min-height: 50vh;
        }

        .lead-magnet .beat-title {
            font-style: italic;
            font-size: 0.95rem;
            color: #9381FF;
            margin-bottom: 32px;
            text-align: center;
        }

        /* Contact + footer */
        .contact-footer {
            min-height: 40vh;
            padding-bottom: 40px;
        }

        .footer {
            font-size: 0.75rem;
            color: #666;
            margin-top: 48px;
            text-align: center;
        }

        /* Scroll animations — hidden states */
        .reveal-up {
            opacity: 0;
            transform: translateY(60px);
            will-change: opacity, transform;
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-40px);
            will-change: opacity, transform;
        }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.8);
            will-change: opacity, transform;
        }

        .reveal-fade {
            opacity: 0;
            will-change: opacity;
        }

        /* Visible state */
        .visible {
            opacity: 1;
            transform: none;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .delay-1 { transition-delay: 0.2s; }

        @media (max-width: 480px) {
            .social-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- HERO -->
    <section class="hero">
        <div class="logo">Rn<span class="dot">·</span>Blue</div>
        <p class="subtitle">Dark R&B Type Beats</p>
        <p class="tagline">Room to breathe</p>
        <div class="scroll-arrow"><span></span></div>
    </section>

    <!-- BEATS -->
    <section class="beats">
        <div class="reveal-up">
            <h2>Ascolta i beat</h2>
            <p class="section-sub">Produzioni Dark R&B disponibili per licensing</p>
            <a href="https://www.beatstars.com/claudioblond96" target="_blank" rel="noopener noreferrer" class="link-btn">🎵 Vai su BeatStars</a>
        </div>
    </section>

    <!-- SOCIAL -->
    <section class="social">
        <div class="reveal-up">
            <h2>Seguimi</h2>
            <p class="section-sub">&nbsp;</p>
        </div>
        <div class="social-row">
            <a href="https://youtube.com/@rnbluebeats" target="_blank" rel="noopener noreferrer" class="link-btn link-btn-compact reveal-left">🎧 YouTube</a>
            <a href="https://instagram.com/rnbluebeats" target="_blank" rel="noopener noreferrer" class="link-btn link-btn-compact reveal-left delay-1">📱 Instagram</a>
        </div>
    </section>

    <!-- LEAD MAGNET -->
    <section class="lead-magnet">
        <div class="reveal-scale" style="text-align:center;width:100%;">
            <h2>Beat gratuito</h2>
            <p class="beat-title">"Escape" — Dark H.E.R. Type Beat 2026</p>
            <a href="https://bsta.rs/Mba1c" target="_blank" rel="noopener noreferrer" class="link-btn link-btn-glow">🎁 Scarica gratis</a>
        </div>
    </section>

    <!-- CONTACT + FOOTER -->
    <section class="contact-footer">
        <div class="reveal-fade" style="width:100%;text-align:center;">
            <a href="mailto:claudioblond96@gmail.com" target="_blank" rel="noopener noreferrer" class="link-btn link-btn-compact">📩 Contattami</a>
            <p class="footer">© 2026 RnBlue Beats · Room to breathe</p>
        </div>
    </section>

    <script>
        /* Particle canvas */
        (function () {
            var canvas = document.getElementById('particles');
            var ctx = canvas.getContext('2d');
            var particles = [];
            var count = 50;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            for (var i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: 1 + Math.random() * 2,
                    dx: (Math.random() - 0.5) * 0.4,
                    dy: (Math.random() - 0.5) * 0.4,
                    o: 0.1 + Math.random() * 0.3
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < particles.length; i++) {
                    var p = particles[i];
                    p.x += p.dx;
                    p.y += p.dy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,' + p.o + ')';
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        })();

        /* Scroll reveal with IntersectionObserver */
        (function () {
            var targets = document.querySelectorAll('.reveal-up, .reveal-left, .reveal-scale, .reveal-fade');
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.2 });

            targets.forEach(function (el) {
                observer.observe(el);
            });
        })();
    </script>
</body>
</html>
